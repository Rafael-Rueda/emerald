commands:
  install: pnpm install
  lint: pnpm lint
  typecheck: pnpm typecheck
  build: pnpm build
  test: pnpm test -- --run --maxWorkers=8
  e2e: npx playwright test --project=chromium --workers=6
  storybook_build: pnpm storybook:build
  api_test_unit: pnpm --filter @emerald/api test:unit
  api_test_e2e: pnpm --filter @emerald/api test:e2e
  api_migrate: pnpm --filter @emerald/api prisma migrate dev
  api_seed: pnpm --filter @emerald/api prisma db seed
  api_generate: pnpm --filter @emerald/api prisma generate
  api_psql_dev: docker exec -e PGPASSWORD=sardius_password sardius_postgres psql -U sardius_user -d sardius_db
  api_psql_test: docker exec -e PGPASSWORD=sardius_password sardius_postgres_test psql -U sardius_user -d sardius_db
  api_start_test: pnpm --filter @emerald/api exec dotenv -e .env.test -- nest start
  mcp_build: pnpm --filter @emerald/mcp-server build
  mcp_start: node packages/mcp-server/dist/index.js

services:
  postgres-dev:
    start: docker compose -f apps/api/docker-compose.yml up -d postgres
    stop: docker compose -f apps/api/docker-compose.yml stop postgres
    healthcheck: powershell -NoProfile -Command "(Invoke-WebRequest -Uri http://localhost:5434 -UseBasicParsing -TimeoutSec 2 -ErrorAction SilentlyContinue).StatusCode; docker compose -f apps/api/docker-compose.yml ps postgres"
    port: 5434
    depends_on: []

  postgres-test:
    start: docker compose -f apps/api/docker-compose.yml up -d postgres-test
    stop: docker compose -f apps/api/docker-compose.yml stop postgres-test
    healthcheck: powershell -NoProfile -Command "docker compose -f apps/api/docker-compose.yml ps postgres-test"
    port: 5435
    depends_on: []

  api:
    start: pnpm --filter @emerald/api start:dev
    stop: powershell -NoProfile -Command "Get-NetTCPConnection -LocalPort 3333 -ErrorAction SilentlyContinue | ForEach-Object { Stop-Process -Id `$_.OwningProcess -Force }"
    healthcheck: powershell -NoProfile -Command "(Invoke-WebRequest -Uri http://localhost:3333/health -UseBasicParsing -TimeoutSec 5).StatusCode"
    port: 3333
    depends_on: [postgres-dev]

  docs:
    start: pnpm --filter @emerald/docs dev --port 3100
    stop: powershell -NoProfile -Command "Get-NetTCPConnection -LocalPort 3100 -ErrorAction SilentlyContinue | ForEach-Object { Stop-Process -Id `$_.OwningProcess -Force }"
    healthcheck: powershell -NoProfile -Command "(Invoke-WebRequest -Uri http://localhost:3100 -UseBasicParsing -TimeoutSec 5).StatusCode"
    port: 3100
    depends_on: []

  workspace:
    start: pnpm --filter @emerald/workspace dev --port 3101
    stop: powershell -NoProfile -Command "Get-NetTCPConnection -LocalPort 3101 -ErrorAction SilentlyContinue | ForEach-Object { Stop-Process -Id `$_.OwningProcess -Force }"
    healthcheck: powershell -NoProfile -Command "(Invoke-WebRequest -Uri http://localhost:3101 -UseBasicParsing -TimeoutSec 5).StatusCode"
    port: 3101
    depends_on: []

  storybook:
    start: pnpm storybook -- --port 6100
    stop: powershell -NoProfile -Command "Get-NetTCPConnection -LocalPort 6100 -ErrorAction SilentlyContinue | ForEach-Object { Stop-Process -Id `$_.OwningProcess -Force }"
    healthcheck: powershell -NoProfile -Command "(Invoke-WebRequest -Uri http://localhost:6100 -UseBasicParsing -TimeoutSec 5).StatusCode"
    port: 6100
    depends_on: []
