# ----------------------------------------------------------------------------
# Emerald — Production docker-compose
# Self-host stack: postgres (pgvector) + migrate + api + docs + workspace + caddy
#
# Usage:
#   1. Populate .env.production at repo root (see .env.production.example — Chunk 3).
#   2. Place secrets/gcp-key.json (service account) — ignored by git.
#   3. `docker compose -f docker-compose.production.yml --env-file .env.production up -d`
#      (optionally `--profile with-proxy` to enable bundled Caddy).
#
# Coolify / external reverse proxy: skip the `with-proxy` profile and wire
# api/docs/workspace to the platform's proxy via the emerald_net network.
# ----------------------------------------------------------------------------

name: emerald

# --- Shared env anchors -------------------------------------------------------
x-postgres-env: &postgres-env
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}

services:
    # ------------------------------------------------------------------------
    # postgres — pgvector extension pre-installed.
    # No host port published: only internal services reach it via emerald_net.
    # ------------------------------------------------------------------------
    postgres:
        image: pgvector/pgvector:pg17
        restart: unless-stopped
        environment:
            <<: *postgres-env
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - emerald_net

    # ------------------------------------------------------------------------
    # migrate — one-shot init container. Applies Prisma migrations and exits.
    # Reuses the api image so the Prisma CLI + schema are already present.
    # ------------------------------------------------------------------------
    migrate:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        restart: "no"
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DATABASE_URL: ${DATABASE_URL}
        command: >
            sh -c "node_modules/.bin/prisma migrate deploy
            --schema=apps/api/src/infra/database/prisma/schema.prisma"
        networks:
            - emerald_net

    # ------------------------------------------------------------------------
    # api — NestJS HTTP API. Waits for postgres health + migrations.
    # ------------------------------------------------------------------------
    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        environment:
            NODE_ENV: production
            PORT: 3333
            DATABASE_URL: ${DATABASE_URL}
            JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
            JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
            GOOGLE_OAUTH2_CLIENT_ID: ${GOOGLE_OAUTH2_CLIENT_ID}
            GOOGLE_OAUTH2_CLIENT_SECRET: ${GOOGLE_OAUTH2_CLIENT_SECRET}
            GOOGLE_OAUTH2_REDIRECT_URL: ${GOOGLE_OAUTH2_REDIRECT_URL}
            # ---- Embedding provider (pluggable: voyage | openai | google | ollama) ----
            EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-voyage}
            EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-512}
            # Voyage
            VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
            VOYAGE_MODEL: ${VOYAGE_MODEL:-voyage-3-lite}
            # OpenAI
            OPENAI_API_KEY: ${OPENAI_API_KEY:-}
            OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
            # Google Vertex AI
            GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID:-}
            GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
            GOOGLE_VERTEX_LOCATION: ${GOOGLE_VERTEX_LOCATION:-us-central1}
            GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-text-embedding-004}
            # Ollama (self-hosted — not bundled in this compose; run on host or remote)
            OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
            OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-}
            DOCS_APP_URL: https://docs.${DOMAIN}
            DOCS_REVALIDATE_SECRET: ${DOCS_REVALIDATE_SECRET}
            GCP_BUCKET_NAME: ${GCP_BUCKET_NAME}
            GCP_KEY_FILE_PATH: /run/secrets/gcp-key.json
            MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
            CORS_ALLOWED_ORIGINS: https://docs.${DOMAIN},https://app.${DOMAIN}
            LOG_LEVEL: ${LOG_LEVEL:-log}
        volumes:
            - ./secrets/gcp-key.json:/run/secrets/gcp-key.json:ro
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3333/health || exit 1"]
            interval: 30s
            timeout: 5s
            start_period: 30s
            retries: 3
        networks:
            - emerald_net

    # ------------------------------------------------------------------------
    # docs — Next.js public docs site. Needs api healthy at build + runtime.
    # NEXT_PUBLIC_* is baked at build time; DOMAIN must be known during build.
    # ------------------------------------------------------------------------
    docs:
        build:
            context: .
            dockerfile: apps/docs/Dockerfile
            args:
                NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
        restart: unless-stopped
        depends_on:
            api:
                condition: service_healthy
        environment:
            NODE_ENV: production
            NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
            DOCS_REVALIDATE_SECRET: ${DOCS_REVALIDATE_SECRET}
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health || exit 1"]
            interval: 30s
            timeout: 5s
            start_period: 20s
            retries: 3
        networks:
            - emerald_net

    # ------------------------------------------------------------------------
    # workspace — Next.js authoring app (app.<domain>).
    # ------------------------------------------------------------------------
    workspace:
        build:
            context: .
            dockerfile: apps/workspace/Dockerfile
            args:
                NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
        restart: unless-stopped
        depends_on:
            api:
                condition: service_healthy
        environment:
            NODE_ENV: production
            NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3101/api/health || exit 1"]
            interval: 30s
            timeout: 5s
            start_period: 20s
            retries: 3
        networks:
            - emerald_net

    # ------------------------------------------------------------------------
    # caddy — optional reverse proxy with automatic TLS (Let's Encrypt).
    # Skip this service entirely when deploying behind Coolify/Traefik/etc.
    # Enable with: `docker compose --profile with-proxy up -d`.
    # ------------------------------------------------------------------------
    caddy:
        image: caddy:2-alpine
        profiles:
            - with-proxy
        restart: unless-stopped
        depends_on:
            - api
            - docs
            - workspace
        ports:
            - "80:80"
            - "443:443"
        environment:
            DOMAIN: ${DOMAIN}
            ACME_EMAIL: ${ACME_EMAIL}
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        networks:
            - emerald_net

volumes:
    postgres_data:
    caddy_data:
    caddy_config:

networks:
    emerald_net:
        driver: bridge
